apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: {{ include "matilda-k8s-agent.fullname" . }}-network-agent
  namespace: {{ .Values.namespace.name | default .Release.Namespace }}
  labels:
    {{- include "matilda-k8s-agent.labels" . | nindent 4 }}
    app.kubernetes.io/component: network-agent
spec:
  selector:
    matchLabels:
      {{- include "matilda-k8s-agent.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: network-agent
  template:
    metadata:
      labels:
        {{- include "matilda-k8s-agent.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: network-agent
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "matilda-k8s-agent.serviceAccountName" . }}
      {{- if .Values.network.hostNetwork }}
      hostNetwork: {{ .Values.network.hostNetwork }}
      {{- end }}
      {{- if .Values.network.dnsPolicy }}
      dnsPolicy: {{ .Values.network.dnsPolicy }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      volumes:
      - name: metrics-shared
        hostPath:
          path: /var/lib/network-metrics
          type: DirectoryOrCreate
      initContainers:
      - name: cleanup
        image: busybox:1.36
        command: ["sh", "-c", "rm -rf /var/lib/network-metrics/*"]
        securityContext:
          privileged: true
          runAsUser: 0
        volumeMounts:
        - name: metrics-shared
          mountPath: /var/lib/network-metrics
      containers:
      - name: network-agent
        image: "{{ .Values.image.daemonset.repository }}:{{ .Values.image.daemonset.tag | default .Chart.AppVersion }}"
        imagePullPolicy: {{ .Values.image.daemonset.pullPolicy }}
        securityContext:
          privileged: true
          runAsUser: 0
          runAsGroup: 0
        {{- with .Values.resources }}
        resources:
          {{- toYaml . | nindent 10 }}
        {{- end }}
        env:
        - name: API_HOST
          value: {{ .Values.api_host | quote }}
        - name: API_KEY
          valueFrom:
            secretKeyRef:
              name: {{ include "matilda-k8s-agent.secretName" . }}
              key: api-key
        - name: CLUSTER_ID
          value: {{ .Values.id | quote }}
        volumeMounts:
        - name: metrics-shared
          mountPath: /tmp/metrics
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "matilda-k8s-agent.fullname" . }}-network-agent
  namespace: {{ .Values.namespace.name | default .Release.Namespace }}
  labels:
    {{- include "matilda-k8s-agent.labels" . | nindent 4 }}
    app.kubernetes.io/component: network-agent
spec:
  type: {{ .Values.service.type }}
  ports:
  - port: {{ .Values.service.daemonset.port }}
    targetPort: metrics
    protocol: TCP
    name: metrics
  selector:
    {{- include "matilda-k8s-agent.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: network-agent