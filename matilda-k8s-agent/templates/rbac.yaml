{{- if .Values.rbac.create }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "matilda-k8s-agent.fullname" . }}-clusterrole
  labels:
    {{- include "matilda-k8s-agent.labels" . | nindent 4 }}
    app.kubernetes.io/component: clusterrole
rules:
  - apiGroups: ["*"]
    resources:
      - nodes
      - nodes/stats
      - nodes/metrics
      - pods
      - pods/metrics
      - namespaces
      - services
      - endpoints
      - endpointslices
      - persistentvolumes
      - persistentvolumeclaims
      - replicationcontrollers
      - serviceaccounts
      - resourcequotas
      - limitranges
      - deployments
      - replicasets
      - statefulsets
      - daemonsets
      - controllerrevisions
      - jobs
      - cronjobs
      - horizontalpodautoscalers
      - ingresses
      - ingressclasses
      - networkpolicies
      - storageclasses
      - volumeattachments
      - csinodes
      - csidrivers
      - csistoragecapacities
      - roles
      - rolebindings
      - clusterroles
      - clusterrolebindings
      - poddisruptionbudgets
      - customresourcedefinitions
      - certificatesigningrequests
      - apiservices
      - volumesnapshots
      - volumesnapshotclasses
      - volumesnapshotcontents
    verbs: ["get", "list", "watch"]

--- 
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "matilda-k8s-agent.fullname" . }}-clusterrolebinding
  labels:
    {{- include "matilda-k8s-agent.labels" . | nindent 4 }}
    app.kubernetes.io/component: clusterrolebinding
roleRef:
  kind: ClusterRole
  name: {{ include "matilda-k8s-agent.fullname" . }}-clusterrole
  apiGroup: rbac.authorization.k8s.io
subjects:
  - kind: ServiceAccount
    name: {{ include "matilda-k8s-agent.serviceAccountName" . }}
    namespace: {{ .Values.namespace.name | default .Release.Namespace }}
{{- end }}